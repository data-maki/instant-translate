<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">Before and after source-language transcript display</title>
  <desc id="desc">Comparison showing source-language text moving from secondary display to primary display for Catalan and Chinese examples.</desc>
  <rect width="1440" height="820" fill="#f6f4ee"/>
  <text x="72" y="82" fill="#1e2a2f" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="700">Transcript source display</text>
  <text x="72" y="124" fill="#5f6b70" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="19">Primary line should be the original source text. English translation stays secondary.</text>

  <g transform="translate(72 174)">
    <rect width="620" height="548" rx="22" fill="#ffffff" stroke="#dfd9ce"/>
    <text x="36" y="58" fill="#8d2b23" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="700">Before</text>
    <text x="36" y="91" fill="#7a817f" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Fallback could make the English translation the main line.</text>

    <g transform="translate(36 132)">
      <rect width="548" height="154" rx="18" fill="#f8faf9" stroke="#e4e2db"/>
      <text x="28" y="38" fill="#6f7775" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">CATALAN SOURCE</text>
      <text x="28" y="86" fill="#1d2a2e" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="700">I am hungry</text>
      <text x="28" y="124" fill="#8d2b23" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22">tinc gana</text>
    </g>

    <g transform="translate(36 318)">
      <rect width="548" height="154" rx="18" fill="#f8faf9" stroke="#e4e2db"/>
      <text x="28" y="38" fill="#6f7775" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">CHINESE SOURCE</text>
      <text x="28" y="86" fill="#1d2a2e" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="700">I am hungry</text>
      <text x="28" y="124" fill="#8d2b23" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="25">我饿了</text>
    </g>
  </g>

  <g transform="translate(748 174)">
    <rect width="620" height="548" rx="22" fill="#ffffff" stroke="#c9ded1"/>
    <text x="36" y="58" fill="#1f7a45" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="700">After</text>
    <text x="36" y="91" fill="#68736c" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Primary is always the original source text; translation is secondary.</text>

    <g transform="translate(36 132)">
      <rect width="548" height="154" rx="18" fill="#f7fbf8" stroke="#d7e7dc"/>
      <text x="28" y="38" fill="#68736c" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">CATALAN SOURCE</text>
      <text x="28" y="86" fill="#1d2a2e" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="700">tinc gana</text>
      <text x="28" y="124" fill="#1f7a45" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22">I am hungry</text>
    </g>

    <g transform="translate(36 318)">
      <rect width="548" height="154" rx="18" fill="#f7fbf8" stroke="#d7e7dc"/>
      <text x="28" y="38" fill="#68736c" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">CHINESE SOURCE</text>
      <text x="28" y="86" fill="#1d2a2e" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="36" font-weight="700">我饿了</text>
      <text x="28" y="124" fill="#1f7a45" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22">I am hungry</text>
    </g>
  </g>
</svg>
